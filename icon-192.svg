<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbb249"/>
      <stop offset="100%" stop-color="#f59e3b"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="3" flood-color="#000" flood-opacity="0.18"/>
    </filter>
  </defs>
  <!-- 둥근 사각형 배경 -->
  <rect x="0" y="0" width="192" height="192" rx="42" ry="42" fill="url(#bg)"/>
  <!-- 미세한 격자무늬 (노트 느낌) -->
  <g opacity="0.08" stroke="#fff" stroke-width="1">
    <line x1="0" y1="48" x2="192" y2="48"/>
    <line x1="0" y1="96" x2="192" y2="96"/>
    <line x1="0" y1="144" x2="192" y2="144"/>
  </g>
  <!-- ∑ 심볼 -->
  <text x="96" y="128" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="120" font-weight="700"
        fill="#ffffff"
        filter="url(#shadow)">∑</text>
</svg>
